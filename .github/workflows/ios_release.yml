name: iOS release
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version'
        required: true

jobs:
  code_quality:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7
      - name: set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'corretto'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Unit tests
        run: ./gradlew allTests
      - name: Static checks
        run: ./gradlew spotlessCheck
  build_and_release:
    needs: code_quality
    permissions:
      contents: write
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Tag release
        id: tag
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          NEW_TAG="ios-${{ github.event.inputs.version }}"

          if git rev-parse "$NEW_TAG" >/dev/null 2>&1; then
            echo "Tag $NEW_TAG already exists, skipping tagging but continuing the release."
          else
            git tag "$NEW_TAG"
            git push origin "$NEW_TAG"
          fi

          HIGHEST_VERSION=$(git tag --list 'ios-*' | sed 's/^ios-//' | sort -V | tail -n 1)
          echo "version=$HIGHEST_VERSION" >> "$GITHUB_OUTPUT"
      - name: Create GoogleService-Info.plist
        env:
          IOS_FIREBASE_CONFIG: ${{ secrets.IOS_FIREBASE_CONFIG }}
        run: echo "$IOS_FIREBASE_CONFIG" | base64 -d > iosApp/iosApp/GoogleService-Info.plist
      - name: set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'corretto'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-home-cache-cleanup: true
          cache-encryption-key: ${{ secrets.GRADLE_CACHE_ENCRYPTION_KEY }}
      - name: Cache KMP tooling
        uses: actions/cache@v6
        with:
          path: |
            ~/.konan
          key: ${{ runner.os }}-v1-${{ hashFiles('gradle/libs.versions.toml') }}
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Import certs
        uses: apple-actions/import-codesign-certs@v7
        with:
          p12-file-base64: ${{ secrets.IOS_CERTIFICATES_P12 }}
          p12-password: ${{ secrets.IOS_CERTIFICATES_PASSWORD }}
      - name: Download provisioning profiles
        uses: apple-actions/download-provisioning-profiles@v6
        with:
          bundle-id: ${{ secrets.IOS_BUNDLE_ID }}
          issuer-id: ${{ secrets.IOS_APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.IOS_APPSTORE_KEY_ID }}
          api-private-key: ${{ secrets.IOS_APPSTORE_PRIVATE_KEY }}
      # Signing settings must live in the project's xcconfig, not on the xcodebuild command line.
      # Command line build settings are applied to every target in the build, including the Swift
      # Package targets (Firebase, GoogleUtilities, ...) which reject PROVISIONING_PROFILE_SPECIFIER.
      - name: Configure signing
        env:
          TEAM_ID: ${{ secrets.IOS_APPSTORE_TEAM_ID }}
          BUNDLE_ID: ${{ secrets.IOS_BUNDLE_ID }}
          PROVISIONING_PROFILE_NAME: ${{ secrets.IOS_DIST_PROVISIONING_PROFILE_NAME }}
          VERSION_NAME: ${{ steps.tag.outputs.version }}
          BUILD_NUMBER: ${{ github.run_number }}
        run: |
          cat <<EOF > iosApp/Configuration/Config.xcconfig
          PRODUCT_NAME=Open KSeF
          PRODUCT_BUNDLE_IDENTIFIER=${BUNDLE_ID}

          DEVELOPMENT_TEAM=${TEAM_ID}
          CODE_SIGN_STYLE=Manual
          CODE_SIGN_IDENTITY=Apple Distribution
          PROVISIONING_PROFILE_SPECIFIER=${PROVISIONING_PROFILE_NAME}

          CURRENT_PROJECT_VERSION=${BUILD_NUMBER}
          MARKETING_VERSION=${VERSION_NAME}
          EOF
      - name: Build archive
        run: |
          cd iosApp

          xcrun xcodebuild \
            -scheme "iosApp" \
            -configuration "Release" \
            -sdk "iphoneos" \
            -parallelizeTargets \
            -showBuildTimingSummary \
            -disableAutomaticPackageResolution \
            -derivedDataPath "${RUNNER_TEMP}/Build/DerivedData" \
            -archivePath "${RUNNER_TEMP}/Build/Archives/openksef.xcarchive" \
            -resultBundlePath "${RUNNER_TEMP}/Build/Artifacts/openksef.xcresult" \
            -destination "generic/platform=iOS" \
            archive
      - name: "Generate ExportOptions.plist"
        run: |
          cat <<EOF > ${RUNNER_TEMP}/Build/ExportOptions.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
            <dict>
              <key>destination</key>
              <string>export</string>
              <key>method</key>
              <string>app-store</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>generateAppStoreInformation</key>
              <true/>
              <key>stripSwiftSymbols</key>
              <true/>
              <key>teamID</key>
              <string>${{ secrets.IOS_APPSTORE_TEAM_ID }}</string>
              <key>uploadSymbols</key>
              <true/>
              <key>provisioningProfiles</key>
              <dict>
                <key>${{ secrets.IOS_BUNDLE_ID }}</key>
                <string>${{ secrets.IOS_DIST_PROVISIONING_PROFILE_NAME }}</string>
              </dict>
            </dict>
          </plist>
          EOF
      - id: build_ipa
        name: Build IPA
        run: |
          xcrun xcodebuild \
            -exportArchive \
            -exportOptionsPlist "${RUNNER_TEMP}/Build/ExportOptions.plist" \
            -archivePath "${RUNNER_TEMP}/Build/Archives/openksef.xcarchive" \
            -exportPath "${RUNNER_TEMP}/Build/Archives/openksef.xcarchive"

          echo "ipa_path=${RUNNER_TEMP}/Build/Archives/openksef.xcarchive/Open KSeF.ipa" >> $GITHUB_ENV
      - uses: Apple-Actions/upload-testflight-build@v5
        with:
          app-path: ${{ env.ipa_path }}
          issuer-id: ${{ secrets.IOS_APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.IOS_APPSTORE_KEY_ID }}
          api-private-key: ${{ secrets.IOS_APPSTORE_PRIVATE_KEY }}
